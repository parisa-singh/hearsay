<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hearsay</title>
    <!-- SPA routing fix for GitHub Pages
         When GitHub Pages returns 404 for a direct URL, this script
         encodes the path into a redirect query param and bounces to the root.
         The script in index.html decodes it and restores the URL before React Router initializes.
    -->
    <script>
      var pathSegmentsToKeep = 1; // keeps '/hearsay' as the base
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
